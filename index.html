<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="referrer" content="no-referrer">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#155ca8">
  <link rel="icon" type="image/png" href="bmw-favicon.png?v=3">
  <title>安全访问 | 备件库存结构分析平台</title>
  <style>
    :root{font-family:"Microsoft YaHei UI","Segoe UI",Arial,sans-serif;color:#17212b;background:#edf1f5;font-synthesis:none}
    *{box-sizing:border-box;letter-spacing:0}
    html,body{width:100%;height:100%;min-height:100%;margin:0}
    body{min-width:280px}
    button,input{font:inherit}
    button{cursor:pointer}
    button:disabled{cursor:wait}
    [hidden]{display:none!important}
    .startup{position:fixed;inset:0;z-index:1000;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#edf1f5;color:#17212b}
    .startup-inner{display:grid;justify-items:center;gap:18px;text-align:center}
    .startup-brand{display:flex;align-items:center;gap:12px}
    .startup-title{font-size:18px;font-weight:700}
    .startup-state{display:flex;align-items:center;gap:10px;color:#68747f;font-size:13px}
    .startup-spinner{width:18px;height:18px;border:2px solid #c8d2dc;border-top-color:#155ca8;border-radius:50%;animation:spin .8s linear infinite}
    .login{min-height:100vh;min-height:100dvh;display:grid;grid-template-rows:64px minmax(0,1fr) 42px;background:#edf1f5}
    .brandbar{background:#fff;border-bottom:1px solid #d8dee5}
    .brandbar-inner{width:min(100%,1280px);height:100%;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
    .brand{min-width:0;display:flex;align-items:center;gap:12px}
    .brandmark{width:36px;height:36px;flex:0 0 36px;padding:7px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;border-radius:6px;background:#17324d}
    .brandmark i{display:block;border-radius:1px;background:#fff}
    .brandmark i:nth-child(2){background:#73b7eb}
    .brandmark i:nth-child(3){background:#f1b458}
    .brandmark i:nth-child(4){background:#56b8a5}
    .brandcopy{min-width:0;display:flex;align-items:center;gap:12px}
    .brandname{color:#17212b;font-size:17px;font-weight:700;white-space:nowrap}
    .brandsub{padding-left:12px;border-left:1px solid #d7dde3;color:#68747f;font-size:12px;white-space:nowrap}
    .accessmeta{display:flex;align-items:center;gap:8px;color:#586673;font-size:12px}
    .accessmeta::before{content:"";width:8px;height:8px;border-radius:50%;background:#279071;box-shadow:0 0 0 4px rgba(39,144,113,.12)}
    .main{min-height:0;display:grid;place-items:center;padding:28px}
    .auth-shell{width:min(100%,1160px);min-height:620px;display:grid;grid-template-columns:minmax(0,1.12fr) minmax(420px,.88fr);overflow:hidden;border:1px solid #d6dde4;border-radius:8px;background:#fff;box-shadow:0 18px 48px rgba(22,36,50,.12)}
    .identity-pane{position:relative;min-width:0;overflow:hidden;padding:58px 58px;background:#155ca8;color:#fff}
    .identity-pane::before{content:"";position:absolute;inset:28px;border:1px solid rgba(255,255,255,.14);border-radius:6px;pointer-events:none}
    .identity-copy{position:relative;z-index:2;max-width:430px}
    .identity-tag{margin:0 0 16px;color:#d9ebfb;font-size:13px;font-weight:700}
    .identity-title{max-width:410px;margin:0;color:#fff;font-size:38px;line-height:1.35;font-weight:700}
    .inventory-visual{position:absolute;right:30px;bottom:30px;width:480px;height:300px;z-index:1;isolation:isolate;pointer-events:none}
    .visual-base{position:absolute;left:8px;right:8px;bottom:0;height:2px;background:rgba(255,255,255,.5)}
    .module{--look-x:0px;--look-y:0px;--face-x:0px;--face-y:0px;--body-skew:0deg;position:absolute;bottom:2px;border:1px solid rgba(255,255,255,.2);box-shadow:0 18px 28px rgba(7,34,65,.22);transform:skewX(var(--body-skew));transform-origin:center bottom;transition:height .55s cubic-bezier(.2,.75,.25,1),transform .55s cubic-bezier(.2,.75,.25,1),border-radius .35s ease;will-change:transform;animation:module-enter .55s cubic-bezier(.2,.75,.25,1) both}
    .module-face{position:absolute;display:flex;align-items:center;gap:22px;transform:translate(var(--face-x),var(--face-y));transition:left .35s ease,top .35s ease,transform .12s ease-out}
    .character-eye{position:relative;display:block;width:16px;height:16px;flex:0 0 16px;border-radius:50%;background:#fff;overflow:hidden;transform-origin:center;transition:scale .08s ease}
    .module[data-blinking="true"] .character-eye{scale:1 .12}
    .character-pupil{position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:#26313b;transform:translate(calc(-50% + var(--look-x)),calc(-50% + var(--look-y)));transition:transform .1s ease-out}
    .dot-eye{position:relative;display:block;width:10px;height:10px;flex:0 0 10px;border-radius:50%;background:#26313b}
    .character-mouth{position:absolute;width:62px;height:4px;border-radius:3px;background:#26313b;transform:translate(var(--face-x),var(--face-y));transition:left .35s ease,top .35s ease,transform .2s ease,width .25s ease}
    .module-back{left:70px;width:150px;height:270px;z-index:1;border-radius:9px 9px 2px 2px;background:#7251e6;animation-delay:.05s}
    .module-back .module-face{left:43px;top:34px}
    .module-dark{left:205px;width:105px;height:205px;z-index:2;border-radius:8px 8px 2px 2px;background:#26313b;animation-delay:.12s}
    .module-dark .module-face{left:28px;top:31px;gap:18px}
    .module-dark .character-eye{width:14px;height:14px;flex-basis:14px;animation-delay:1.9s}
    .module-dark .character-pupil{width:5px;height:5px}
    .module-warm{left:15px;width:205px;height:140px;z-index:3;border-radius:104px 104px 2px 2px;background:#f18362;animation-delay:.19s}
    .module-warm .module-face{left:78px;top:63px;gap:28px}
    .module-gold{left:310px;width:120px;height:175px;z-index:4;border-radius:62px 62px 2px 2px;background:#ead14f;animation-delay:.26s}
    .module-gold .module-face{left:44px;top:38px;gap:22px}
    .module-gold .character-mouth{left:29px;top:82px}
    .inventory-visual[data-state="account"] .module-back{height:292px;transform:translateX(28px) skewX(calc(var(--body-skew) - 7deg))}
    .inventory-visual[data-state="account"] .module-dark{transform:translateX(15px) skewX(calc(var(--body-skew) + 6deg))}
    .inventory-visual[data-state="password"] .module-back{height:295px;transform:translateX(32px) skewX(calc(var(--body-skew) - 10deg))}
    .inventory-visual[data-state="password"] .module-dark{transform:translateX(8px) skewX(calc(var(--body-skew) + 3deg))}
    .inventory-visual[data-state="password"] .module-gold .character-mouth{width:46px;transform:translate(var(--look-x),var(--look-y)) rotate(-5deg)}
    .inventory-visual[data-looking="true"] .module-back .module-face{left:50px;top:48px;transform:none}
    .inventory-visual[data-looking="true"] .module-back .character-pupil{transform:translate(calc(-50% + 3px),calc(-50% + 4px))}
    .inventory-visual[data-looking="true"] .module-dark .module-face{left:30px;top:15px;transform:none}
    .inventory-visual[data-looking="true"] .module-dark .character-pupil{transform:translate(-50%,calc(-50% - 4px))}
    .inventory-visual[data-state="revealed"] .module{transform:skewX(0deg)}
    .inventory-visual[data-state="revealed"] .module-face{transform:none}
    .inventory-visual[data-state="revealed"] .module-back .module-face{left:18px;top:28px}
    .inventory-visual[data-state="revealed"] .module-dark .module-face{left:10px;top:24px}
    .inventory-visual[data-state="revealed"] .module-warm .module-face{left:45px;top:67px}
    .inventory-visual[data-state="revealed"] .module-gold .module-face{left:18px;top:30px}
    .inventory-visual[data-state="revealed"] .character-pupil{transform:translate(calc(-50% - 4px),calc(-50% - 4px))}
    .inventory-visual[data-state="revealed"] .dot-eye{transform:translate(-5px,-4px)}
    .inventory-visual[data-state="revealed"] .character-mouth{left:10px;top:82px;transform:translate(-5px,-4px)}
    .inventory-visual[data-state="revealed"] .module-back[data-peeking="true"] .character-pupil{transform:translate(calc(-50% + 4px),calc(-50% + 5px))}
    .inventory-visual[data-state="busy"] .module{transform:skewX(0deg)}
    .auth-pane{min-width:0;display:flex;align-items:center;justify-content:center;padding:54px 52px;background:#fff}
    .auth-form{width:min(100%,390px)}
    .auth-title{margin:0;color:#17212b;font-size:29px;line-height:1.35}
    .auth-title+.field{margin-top:30px}
    label{display:block;margin-bottom:9px;color:#2b3742;font-size:13px;font-weight:700}
    .field+.field{margin-top:16px}
    .textfield{height:48px;border:1px solid #aeb9c4;border-radius:6px;background:#fff;overflow:hidden;transition:border-color .15s,box-shadow .15s,background-color .15s}
    .textfield:focus-within{border-color:#155ca8;box-shadow:0 0 0 3px rgba(21,92,168,.13)}
    .textfield input{width:100%;height:100%;border:0;outline:0;padding:0 14px;color:#17212b;background:transparent}
    .textfield input:disabled{background:#f5f7f9}
    .password{display:grid;grid-template-columns:minmax(0,1fr) 50px;height:48px;border:1px solid #aeb9c4;border-radius:6px;background:#fff;overflow:hidden;transition:border-color .15s,box-shadow .15s,background-color .15s}
    .password:focus-within{border-color:#155ca8;box-shadow:0 0 0 3px rgba(21,92,168,.13)}
    .password input{width:100%;min-width:0;border:0;outline:0;padding:0 14px;color:#17212b;background:transparent}
    .password input:disabled{background:#f5f7f9}
    .toggle{position:relative;width:50px;border:0;border-left:1px solid #d8dee5;background:#f7f9fb;color:#435568}
    .toggle::before{content:"";position:absolute;left:15px;top:17px;width:18px;height:12px;border:2px solid currentColor;border-radius:50%}
    .toggle::after{content:"";position:absolute;left:22px;top:21px;width:6px;height:6px;border-radius:50%;background:currentColor}
    .toggle[data-visible="true"]{color:#155ca8;background:#edf5fc}
    .toggle:disabled{color:#95a0aa;background:#f4f6f8}
    .auth-form[data-state="password-error"] .password{border-color:#b42318;background:#fff8f7;box-shadow:0 0 0 3px rgba(180,35,24,.09)}
    .auth-form[data-state="account-error"] .textfield{border-color:#b42318;background:#fff8f7;box-shadow:0 0 0 3px rgba(180,35,24,.09)}
    .remember-row{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .remember{min-width:0;margin:0;display:flex;align-items:center;gap:9px;color:#43515e;font-size:12px;font-weight:600;cursor:pointer}
    .remember input{width:16px;height:16px;margin:0;accent-color:#155ca8}
    .primary{width:100%;height:48px;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:9px;border:1px solid #155ca8;border-radius:6px;background:#155ca8;color:#fff;font-weight:700;transition:background-color .15s,border-color .15s,box-shadow .15s}
    .primary:hover:not(:disabled){background:#0f4f91;border-color:#0f4f91}
    .primary:disabled{background:#18558f;border-color:#18558f;color:#eaf3fb}
    .primary[data-busy="true"]::before{content:"";width:15px;height:15px;border:2px solid rgba(255,255,255,.42);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .primary:focus-visible,.toggle:focus-visible{outline:3px solid rgba(21,92,168,.22);outline-offset:2px}
    .feedback{margin-top:14px}
    .progress{appearance:none;width:100%;height:4px;margin:0 0 9px;display:block;border:0;border-radius:2px;overflow:hidden;background:#e5eaf0;accent-color:#155ca8}
    .progress::-webkit-progress-bar{background:#e5eaf0}
    .progress::-webkit-progress-value{background:#155ca8}
    .progress::-moz-progress-bar{background:#155ca8}
    .status{min-height:22px;margin:0;color:#64717d;font-size:13px;line-height:1.65}
    .status[data-type="error"]{color:#b42318}
    .footer{display:flex;align-items:center;justify-content:center;gap:7px;padding:0 18px;color:#5f6c78;font-size:12px}
    .workspace{height:100%;background:#fff}
    .workspacebar{display:none!important;height:0!important;border:0!important;padding:0!important;overflow:hidden}
    .workspacestatus{min-width:0;margin-left:auto;color:#65727e;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .appframe{display:block;width:100%;height:100%;border:0;background:#fff}
    @keyframes module-enter{from{opacity:0;translate:0 28px}to{opacity:1;translate:0 0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:900px){.auth-shell{width:min(100%,540px);min-height:0;grid-template-columns:1fr;grid-template-rows:205px auto}.identity-pane{display:block;padding:24px 30px}.identity-pane::before{inset:16px}.identity-tag{display:none}.identity-title{max-width:240px;font-size:22px}.inventory-visual{right:50%;bottom:0;transform:translateX(50%) scale(.55);transform-origin:center bottom}.auth-pane{padding:44px}}
    @media(max-width:520px){.login{grid-template-rows:58px minmax(0,1fr) auto}.brandbar-inner{padding:0 16px}.brandmark{width:34px;height:34px;flex-basis:34px}.brandcopy{gap:0}.brandname{font-size:15px}.brandsub,.accessmeta{display:none}.main{align-items:start;padding:8px 0}.auth-shell{grid-template-rows:120px auto;border:0;border-radius:0;box-shadow:none}.identity-pane{padding:0}.identity-pane::before,.identity-copy{display:none}.inventory-visual{bottom:0;transform:translateX(50%) scale(.36)}.auth-pane{min-height:540px;align-items:flex-start;padding:30px 22px}.auth-title{font-size:26px}.auth-title+.field{margin-top:26px}.footer{min-height:38px;padding:8px 14px calc(8px + env(safe-area-inset-bottom));text-align:center}}
    @media(max-width:360px){.brandbar-inner{padding:0 12px}.brand{gap:9px}.brandname{font-size:14px}.auth-pane{padding-left:18px;padding-right:18px}}
    @media(max-height:800px) and (min-width:901px){.main{align-items:start;padding-top:18px;padding-bottom:18px}.auth-shell{min-height:560px}.identity-pane{padding-top:42px}.auth-pane{padding-top:30px;padding-bottom:30px}.inventory-visual{transform:scale(.88);transform-origin:right bottom}}
    @media(prefers-reduced-motion:reduce){.startup-spinner,.module,.primary[data-busy="true"]::before{animation:none}.module,.module-face,.character-eye,.character-pupil,.dot-eye,.character-mouth{transition:none}}
  </style>
</head>
<body>
  <section class="startup" data-startup role="status" aria-live="polite" aria-busy="true">
    <div class="startup-inner">
      <div class="startup-brand"><span class="brandmark" aria-hidden="true"><i></i><i></i><i></i><i></i></span><strong class="startup-title">备件库存结构分析平台</strong></div>
      <div class="startup-state"><span class="startup-spinner" aria-hidden="true"></span><span>正在打开平台</span></div>
    </div>
  </section>
  <section class="login" data-login-shell hidden>
    <header class="brandbar">
      <div class="brandbar-inner">
        <div class="brand">
          <span class="brandmark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="brandcopy"><strong class="brandname">备件库存结构分析平台</strong><span class="brandsub">企业内部系统</span></span>
        </div>
        <div class="accessmeta">安全访问</div>
      </div>
    </header>
    <main class="main">
      <div class="auth-shell">
        <section class="identity-pane" aria-labelledby="product-title">
          <div class="identity-copy">
            <p class="identity-tag">备件业务工作台</p>
            <h1 class="identity-title" id="product-title">备件库存结构分析平台</h1>
          </div>
          <div class="inventory-visual" data-character-scene data-state="idle" aria-hidden="true">
            <span class="visual-base"></span>
            <span class="module module-back" data-character="purple"><span class="module-face"><i class="character-eye"><b class="character-pupil"></b></i><i class="character-eye"><b class="character-pupil"></b></i></span></span>
            <span class="module module-dark" data-character="dark"><span class="module-face"><i class="character-eye"><b class="character-pupil"></b></i><i class="character-eye"><b class="character-pupil"></b></i></span></span>
            <span class="module module-warm" data-character="warm"><span class="module-face"><i class="dot-eye"></i><i class="dot-eye"></i></span></span>
            <span class="module module-gold" data-character="gold"><span class="module-face"><i class="dot-eye"></i><i class="dot-eye"></i></span><i class="character-mouth"></i></span>
          </div>
        </section>
        <section class="auth-pane">
          <form class="auth-form" data-unlock-form aria-labelledby="auth-title" aria-busy="false">
            <h2 class="auth-title" id="auth-title">欢迎登录</h2>
            <div class="field">
              <label for="access-account">账号</label>
              <div class="textfield">
                <input id="access-account" data-account type="text" value="lu.wei" autocomplete="username" autocapitalize="none" spellcheck="false" required aria-describedby="login-status" aria-invalid="false">
              </div>
            </div>
            <div class="field">
              <label for="access-password">密码</label>
              <div class="password">
                <input id="access-password" data-password type="password" autocomplete="current-password" autocapitalize="none" spellcheck="false" required aria-describedby="login-status" aria-invalid="false">
                <button class="toggle" data-toggle-password data-visible="false" type="button" aria-label="显示密码" aria-pressed="false" title="显示或隐藏密码"></button>
              </div>
            </div>
            <div class="remember-row">
              <label class="remember"><input data-remember type="checkbox" checked><span>记住密码</span></label>
            </div>
            <button class="primary" data-submit data-busy="false" type="submit">登录</button>
            <div class="feedback" data-feedback hidden>
              <progress class="progress" data-progress max="100" value="0" aria-label="登录加载进度" hidden></progress>
              <p class="status" id="login-status" data-status role="status" aria-live="polite"></p>
            </div>
          </form>
        </section>
      </div>
    </main>
    <footer class="footer"><span>备件库存结构分析平台</span><span aria-hidden="true">·</span><span>安全访问门户</span></footer>
  </section>
  <section class="workspace" data-workspace hidden>
    <header class="workspacebar">
      <span class="workspacestatus" data-workspace-status role="status" aria-live="polite"></span>
    </header>
    <iframe class="appframe" data-app-frame title="备件库存结构分析平台"></iframe>
  </section>
  <script type="module" src="secure-loader-v2.js?v=3.2"></script>
</body>
</html>
