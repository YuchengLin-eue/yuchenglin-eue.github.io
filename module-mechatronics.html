<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>正在安全加载</title>
  <style>
    :root{font-family:"Microsoft YaHei UI","Segoe UI",Arial,sans-serif;color:#30443e;background:#f5f7f6}
    *{box-sizing:border-box;letter-spacing:0}
    html,body{width:100%;height:100%;margin:0}
    body{display:grid;place-items:center;padding:20px}
    main{text-align:center}
    .spinner{width:28px;height:28px;margin:0 auto 14px;border:3px solid #cad5d1;border-top-color:#246a5a;border-radius:50%;animation:spin .8s linear infinite}
    p{margin:0;color:#60716b;font-size:13px}
    p[data-error]{max-width:420px;color:#9c3030;line-height:1.7}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.spinner{animation-duration:1.8s}}
  </style>
</head>
<body>
  <main><div class="spinner" data-spinner></div><p data-status>正在安全加载模块</p></main>
  <script>
    (function(){
      var files={"module-quote.html":"quote","module-inventory.html":"inventory","module-pom.html":"pom","module-mechatronics.html":"mechatronics"};
      var name=location.pathname.slice(location.pathname.lastIndexOf("/")+1);
      var moduleId=files[name];
      var requestId=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);
      var status=document.querySelector("[data-status]");
      var spinner=document.querySelector("[data-spinner]");
      var timer;
      function fail(message){clearTimeout(timer);spinner.hidden=true;status.dataset.error="";status.textContent=message}
      if(!moduleId||window.top===window){fail("请从平台内打开此功能");return}
      function receive(event){
        if(event.source!==window.top||event.origin!==location.origin)return;
        var data=event.data;
        if(!data||data.type!=="secure-module-response"||data.requestId!==requestId)return;
        clearTimeout(timer);
        if(!data.ok||typeof data.html!=="string"||data.html.length<20){fail(data.message||"模块加载失败");return}
        var frame=window.frameElement;
        if(!frame){fail("模块容器不可用");return}
        window.removeEventListener("message",receive);
        setTimeout(function(){frame.srcdoc=data.html},0);
      }
      window.addEventListener("message",receive);
      timer=setTimeout(function(){fail("模块加载超时，请返回后重试")},120000);
      window.top.postMessage({type:"secure-module-request",module:moduleId,requestId:requestId},location.origin);
    })();
  </script>
</body>
</html>
